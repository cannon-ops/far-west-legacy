# render.yaml — Far West Legacy
# Render Blueprint: defines the web service for farwestlegacy.com
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: far-west-legacy
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT src.app:app
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: FLASK_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # set in Render dashboard or via API; never commit a value
